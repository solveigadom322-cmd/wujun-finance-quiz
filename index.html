rder-color:#93c5fd}.reveal{display:none;margin-top:12px;border-top:1px dashed var(--line);padding-top:12px}.lesson.submitted .reveal{display:block}.correct{color:var(--ok);font-weight:700}.wrong{color:var(--bad);font-weight:700}blockquote{margin:8px 0;padding:10px 12px;background:#f8fafc;border-left:4px solid #93c5fd;border-radius:8px;color:#334155}.meta{color:var(--muted);font-size:13px}footer{text-align:center;color:var(--muted);font-size:13px;padding:30px 18px}@media print{.top button,.top input,.lessonActions{display:none}.top{position:static}body{background:white}.card,.lesson{break-inside:avoid;box-shadow:none}.reveal{display:block}}
</style></head><body><header><div class="wrap"><h1>吴军·财商训练40讲｜分课考试</h1><p class="sub">仅保留单选 / 多选 / 判断。每节课单独提交、单独计分；提交本节后才显示答案、原文依据和论证。</p></div></header><main class="wrap"><div class="top"><div class="row"><input id="student" type="text" placeholder="输入姓名/编号"><button class="ghost" id="copyAll">复制已提交成绩</button><button class="ghost" id="csvAll">下载已提交 CSV</button><button class="secondary" onclick="location.reload()">全部重做</button></div><div class="nav" id="nav"></div><p class="meta" id="overall"></p></div><div id="exam"></div></main><footer>仅供个人学习复习使用｜静态网页不自动收集成绩，请让考生每节提交后复制/下载成绩发回。</footer><script id="quiz-data" type="application/json">[{"title":"001 发刊词｜来！开启自己的富足人生","questions":[{"id":"q1","no":1,"type":"单选","stem":"课程中对“财商”的核心理解更接近哪一项？","options":[{"key":"A","text":"投资技巧"},{"key":"B","text":"系统性处理财富的能力"},{"key":"C","text":"高学历带来的收入优势"},{"key":"D","text":"会省钱"}],"answer":"B","explain":"财商包括理解财富、获取财富、增值财富和使用财富等维度。","quote":"财商是一个人的一个系统性的能力，包含理解财富、获取财富、增值财富和使用财富等多个维度。"},{"id":"q2","no":2,"type":"判断","stem":"吴军认为，学历、智力、努力足够高，财富自然会随之而来。","options":[],"answer":"错","explain":"这些因素只是可能性，财商是另一个独立维度，并会影响最终财富结果。","quote":"你最终的财富，是学历、智力、努力这些维度，与财商相乘的结果。"},{"id":"q3","no":3,"type":"单选","stem":"课程用“乘数关系”说明财商，是为了强调什么？","options":[{"key":"A","text":"财商可以单独决定一切"},{"key":"B","text":"财商会放大或缩小其他能力带来的财富结果"},{"key":"C","text":"财商只影响投资收益"},{"key":"D","text":"财商等于运气"}],"answer":"B","explain":"财商与学历、智力、努力相乘，低财商会拖低整体结果。","quote":"分化时代的机会，格外需要财商来分辨。"},{"id":"q4","no":4,"type":"单选","stem":"“错把能力当运气”的危险在哪里？","options":[{"key":"A","text":"更容易高估短期投资收益"},{"key":"B","text":"会把可训练的能力误认为随机运气，从而放弃提升"},{"key":"C","text":"会导致完全不相信运气"},{"key":"D","text":"会让人只关注学历"}],"answer":"B","explain":"这比错把运气当能力更隐蔽，因为它让人忽视可培养的能力。","quote":"我把课程设计成了五个模块：财商破局、理解财富、怎么挣钱、怎么赚钱、怎么使用财富。"},{"id":"q5","no":5,"type":"单选","stem":"在财富机会剧烈分化的时代，最需要什么能力？","options":[{"key":"A","text":"跟风能力"},{"key":"B","text":"财商判断力"},{"key":"C","text":"单纯努力"},{"key":"D","text":"高消费能力"}],"answer":"B","explain":"普涨时代靠大势，分化时代要能识别机会与风险。","quote":"经济学学得好，不等于就能挣到钱，否则经济学教授都是富翁了。"},{"id":"q6","no":6,"type":"多选","stem":"课程五个模块包括哪些？","options":[{"key":"A","text":"财商破局"},{"key":"B","text":"理解财富"},{"key":"C","text":"怎么挣钱"},{"key":"D","text":"怎么赚钱"},{"key":"E","text":"怎么使用财富"}],"answer":"ABCDE","explain":"这是课程设计的五个核心模块。","quote":"财商跟人性高度有关，是最难教的，也最难学的。"},{"id":"q7","no":7,"type":"判断","stem":"吴军认为经济学、金融、投资课程等同于财商教育。","options":[],"answer":"错","explain":"这些内容相关，但不等同于系统训练财商。","quote":"我不能保证你学完这门课就能发财……学完之后，你对财富的理解会和以前大不一样。"},{"id":"q8","no":8,"type":"单选","stem":"课程强调财商难教难学，根本原因之一是什么？","options":[{"key":"A","text":"数学太复杂"},{"key":"B","text":"与人性高度相关"},{"key":"C","text":"没有案例"},{"key":"D","text":"只适合专业投资人"}],"answer":"B","explain":"提高财商本质上要训练对人性的理解和掌控。","quote":"我不能保证你学完这门课就能发财……学完之后，你对财富的理解会和以前大不一样。"},{"id":"q9","no":9,"type":"多选","stem":"哪些人适合学习这门课？","options":[{"key":"A","text":"收入不错但存不下钱的人"},{"key":"B","text":"努力挣钱但收入上不去的人"},{"key":"C","text":"投资不敢碰或一碰就亏的人"},{"key":"D","text":"面对买房、婚姻、教育等财务决策拿不定主意的人"}],"answer":"ABCD","explain":"发刊词中列出了这四类典型问题。","quote":"我不能保证你学完这门课就能发财……学完之后，你对财富的理解会和以前大不一样。"},{"id":"q10","no":10,"type":"单选","stem":"这门课不能保证什么？又能帮助什么？","options":[{"key":"A","text":"保证发财，并给出具体投资品"},{"key":"B","text":"不保证发财，但帮助改变财富理解、训练财商"},{"key":"C","text":"只讲省钱，不讲挣钱"},{"key":"D","text":"只适合专业投资人"}],"answer":"B","explain":"课程定位是能力训练，不是收益承诺。","quote":"我不能保证你学完这门课就能发财……学完之后，你对财富的理解会和以前大不一样。"}]},{"title":"002 专属福利｜《财商训练工具手册》","questions":[{"id":"q11","no":1,"type":"单选","stem":"专属福利提供的资料名称是什么？","options":[{"key":"A","text":"财富自由地图"},{"key":"B","text":"财商训练工具手册"},{"key":"C","text":"投资组合说明书"},{"key":"D","text":"家庭资产表"}],"answer":"B","explain":"福利内容是《财商训练工具手册》。","quote":"我们特意为你准备了一份学习资料：《财商训练工具手册》。"},{"id":"q12","no":2,"type":"多选","stem":"工具手册浓缩了哪三个工具？","options":[{"key":"A","text":"财商训练模型"},{"key":"B","text":"高财商习惯清单"},{"key":"C","text":"财富回报地图"},{"key":"D","text":"股票估值模型"}],"answer":"ABC","explain":"文中明确提到这三个工具。","quote":"这本手册浓缩了三个工具：财商训练模型、高财商习惯清单和财富回报地图。"},{"id":"q13","no":3,"type":"判断","stem":"工具手册只适合在听课时使用，课程之外没有独立价值。","options":[],"answer":"错","explain":"它既可用于课程对照，也可在课程之外独立查阅、反复使用。","quote":"在课程之外，也能独立查阅、反复使用。"},{"id":"q14","no":4,"type":"单选","stem":"这份资料的主要目的是什么？","options":[{"key":"A","text":"替代课程学习"},{"key":"B","text":"帮助训练有方法、知识能落地"},{"key":"C","text":"推荐具体投资品"},{"key":"D","text":"记录消费流水"}],"answer":"B","explain":"手册服务于系统训练和落地。","quote":"通过系统训练，让财商真正成为你的能力。"},{"id":"q15","no":5,"type":"判断","stem":"课程强调的是“通过系统训练，让财商真正成为能力”。","options":[],"answer":"对","explain":"这是福利说明中的核心表述。","quote":"通过系统训练，让财商真正成为你的能力。"},{"id":"q16","no":6,"type":"单选","stem":"为什么工具手册适合作为学习辅助？","options":[{"key":"A","text":"它可以替代课程本身"},{"key":"B","text":"它把关键模型、习惯和回报框架工具化，便于对照和复习"},{"key":"C","text":"它主要用于预测市场短期涨跌"},{"key":"D","text":"它只是一份课程宣传材料"}],"answer":"B","explain":"工具化能降低复习和实践成本。","quote":"通过系统训练，让财商真正成为你的能力。"},{"id":"q17","no":7,"type":"单选","stem":"“高财商习惯清单”更可能用于解决什么问题？","options":[{"key":"A","text":"提醒日常行为是否符合财商训练方向"},{"key":"B","text":"计算股票价格"},{"key":"C","text":"预测汇率"},{"key":"D","text":"生成课程音频"}],"answer":"A","explain":"习惯清单用于日常自检和训练。","quote":"通过系统训练，让财商真正成为你的能力。"},{"id":"q18","no":8,"type":"单选","stem":"“财富回报地图”更接近哪类工具？","options":[{"key":"A","text":"帮助理解财富投入与回报路径"},{"key":"B","text":"旅游地图"},{"key":"C","text":"社交关系表"},{"key":"D","text":"法律合同模板"}],"answer":"A","explain":"它服务于财富认知与决策落地。","quote":"通过系统训练，让财商真正成为你的能力。"},{"id":"q19","no":9,"type":"判断","stem":"领取工具手册的意义在于把课程内容放入自己的“财商工具箱”。","options":[],"answer":"对","explain":"原文使用了“财商工具箱”的表达。","quote":"通过系统训练，让财商真正成为你的能力。"},{"id":"q20","no":10,"type":"单选","stem":"如果把这条福利内容用于复习，最应该记住哪句话？","options":[{"key":"A","text":"财商主要靠天赋"},{"key":"B","text":"工具手册只适合收藏"},{"key":"C","text":"财商要通过模型、清单、地图等工具反复训练成能力"},{"key":"D","text":"听完课程就不需要实践"}],"answer":"C","explain":"这是福利内容的学习价值。","quote":"通过系统训练，让财商真正成为你的能力。"}]},{"title":"003 01｜高财商：怎样系统性地创造财富优势？","questions":[{"id":"q21","no":1,"type":"单选","stem":"本讲认为高财商的人积累财富，主要靠什么？","options":[{"key":"A","text":"一味省钱"},{"key":"B","text":"主动创造财富"},{"key":"C","text":"等待运气"},{"key":"D","text":"压低生活质量"}],"answer":"B","explain":"省钱只能减少浪费，真正积累要靠创造。","quote":"高财商的人积累财富，不靠一味地省钱，而靠主动地创造。"},{"id":"q22","no":2,"type":"判断","stem":"“钱是挣出来的，不是省出来的”意味着完全不需要控制浪费。","options":[],"answer":"错","explain":"控制浪费有价值，但不能把致富建立在抠小钱上。","quote":"钱是挣出来的，不是省出来的。"},{"id":"q23","no":3,"type":"单选","stem":"吴军从张先生那里学到的做生意原则，核心是什么？","options":[{"key":"A","text":"永远薄利多销"},{"key":"B","text":"有特殊性就应获得溢价"},{"key":"C","text":"亏本换规模"},{"key":"D","text":"不谈价格"}],"answer":"B","explain":"特殊性带来定价权。","quote":"如果你能够提供别人提供不了的价值，就应该挣到更多钱。"},{"id":"q24","no":4,"type":"多选","stem":"高财商的三个重要特质包括哪些？","options":[{"key":"A","text":"主动创造财富"},{"key":"B","text":"去钱多的地方"},{"key":"C","text":"懂得哪些问题该用钱解决"},{"key":"D","text":"所有问题都靠钱解决"}],"answer":"ABC","explain":"D 与课程观点相反。","quote":"高财商的人有三个特质：积累财富不靠一味地省钱，而靠主动地创造；知道钱在哪里；懂得哪些问题该用钱解决，哪些不该。"},{"id":"q25","no":5,"type":"单选","stem":"“去鱼多的地方钓鱼”用于说明什么？","options":[{"key":"A","text":"选择赛道很重要"},{"key":"B","text":"钓鱼能发财"},{"key":"C","text":"工作越忙越好"},{"key":"D","text":"专业必须完全对口"}],"answer":"A","explain":"同样能力放在不同赛道，财富结果可能差很多。","quote":"知道钱在哪里，并且主动到钱多的地方去，让能力和财富增值。"},{"id":"q26","no":6,"type":"判断","stem":"课程认为专业对口比赛道选择更重要。","options":[],"answer":"错","explain":"案例强调选择钱多、增值空间大的地方。","quote":"钓鱼的第一条规则就是去鱼多的地方钓；第二条规则就是不要忘记第一条。"},{"id":"q27","no":7,"type":"单选","stem":"张先生“办公永远不要想着省打印纸”的意思是？","options":[{"key":"A","text":"纸张不值钱所以随便浪费"},{"key":"B","text":"不要为小成本牺牲更高价值的效率和机会"},{"key":"C","text":"办公用品必须买贵的"},{"key":"D","text":"做生意不要算账"}],"answer":"B","explain":"该花的钱要花，不该省小钱误大事。","quote":"办公永远不要想着省打印纸。"},{"id":"q28","no":8,"type":"判断","stem":"感情和婚姻问题通常不适合简单用钱解决。","options":[],"answer":"对","explain":"课程强调要把钱的因素和其他因素剥离。","quote":"感情问题，是不该用钱解决的。"},{"id":"q29","no":9,"type":"单选","stem":"为什么“薄利多销”不一定是高财商？","options":[{"key":"A","text":"因为所有低价策略都错误"},{"key":"B","text":"因为客户只会买最贵的东西"},{"key":"C","text":"如果没有垄断或规模优势，薄利会压低净利润，让人陷入低效忙碌"},{"key":"D","text":"因为做生意不需要考虑价格"}],"answer":"C","explain":"关键是特殊性和定价权，而非单纯低价。","quote":"感情问题，是不该用钱解决的。"},{"id":"q30","no":10,"type":"多选","stem":"用“滚雪球”比喻总结本讲。","options":[{"key":"A","text":"获取财富像搞来多少雪，影响起点"},{"key":"B","text":"增值财富像湿雪和长坡，影响天花板"},{"key":"C","text":"使用财富决定雪球是否服务人生"},{"key":"D","text":"滚雪球说明只要节省就能发财"}],"answer":"ABC","explain":"对应挣钱、赚钱和花钱三个层面。","quote":"感情问题，是不该用钱解决的。"}]},{"title":"004 02｜低财商1：怎样识别财富流失的坏习惯？","questions":[{"id":"q31","no":1,"type":"单选","stem":"本讲首先指出低财商最常见的财富使用问题是什么？","options":[{"key":"A","text":"完全不投资"},{"key":"B","text":"过度消费"},{"key":"C","text":"只买保险"},{"key":"D","text":"不买房"}],"answer":"B","explain":"消费接近或超过收入，很难积累财富。","quote":"在使用财富上，最常见的错误行为是过度消费。"},{"id":"q32","no":2,"type":"判断","stem":"高收入天然会带来高净资产。","options":[],"answer":"错","explain":"生活方式通胀会让高收入者也存不下钱。","quote":"很多人随着收入提升，生活方式会自动膨胀，导致净资产增长永远滞后于收入增长。"},{"id":"q33","no":3,"type":"单选","stem":"“生活方式通货膨胀”指什么？","options":[{"key":"A","text":"物价上涨"},{"key":"B","text":"收入提高后生活方式自动膨胀，净资产增长滞后"},{"key":"C","text":"货币贬值"},{"key":"D","text":"房价上涨"}],"answer":"B","explain":"这是高收入但存不下钱的重要原因。","quote":"不要用剩下的钱去储蓄，而要用储蓄之后剩下的钱去生活。"},{"id":"q34","no":4,"type":"单选","stem":"巴菲特关于储蓄的原则更接近哪句话？","options":[{"key":"A","text":"剩多少存多少"},{"key":"B","text":"先储蓄，再用剩下的钱生活"},{"key":"C","text":"全部拿去消费"},{"key":"D","text":"等赚大钱再存"}],"answer":"B","explain":"先存后花能防止钱自然流出。","quote":"把纸面上的财富当成真实的钱，而忽视可能的风险。"},{"id":"q35","no":5,"type":"判断","stem":"纸面财富已经等同于装进口袋的钱。","options":[],"answer":"错","explain":"期权、未兑现收益等存在不确定性，不能当作已到手财富。","quote":"财富不仅要看估值，更要看兑现。"},{"id":"q36","no":6,"type":"单选","stem":"“二鸟在林，不如一鸟在手”强调什么？","options":[{"key":"A","text":"估值越高越好"},{"key":"B","text":"兑现比账面想象更重要"},{"key":"C","text":"风险越大越好"},{"key":"D","text":"机会不能错过"}],"answer":"B","explain":"财富不仅要看估值，还要看能否兑现。","quote":"低财商的表现，分别是：过度消费；迷信纸面财富；羞于谈钱。"},{"id":"q37","no":7,"type":"多选","stem":"本讲总结的三种低财商表现是哪些？","options":[{"key":"A","text":"过度消费"},{"key":"B","text":"迷信纸面财富"},{"key":"C","text":"羞于谈钱"},{"key":"D","text":"坚持记账"}],"answer":"ABC","explain":"D 是改善方法之一。","quote":"第三种情况则更让人恼火——本来是自己的钱，却因为羞于谈钱而拱手让人。"},{"id":"q38","no":8,"type":"判断","stem":"不谈钱通常更能保护关系。","options":[],"answer":"错","explain":"利益不清反而会消耗关系。","quote":"销售的本质就是两句话：第一，把东西卖出去；第二，把钱收回来。"},{"id":"q39","no":9,"type":"单选","stem":"销售的本质除了“把东西卖出去”，还包括什么？","options":[{"key":"A","text":"把钱收回来"},{"key":"B","text":"多打广告"},{"key":"C","text":"降价促销"},{"key":"D","text":"讨好客户"}],"answer":"A","explain":"货卖出但钱没收回，财富没有落袋。","quote":"销售的本质就是两句话：第一，把东西卖出去；第二，把钱收回来。"},{"id":"q40","no":10,"type":"单选","stem":"为什么“面子”是财商的一大敌人？","options":[{"key":"A","text":"因为谈钱一定会破坏所有关系"},{"key":"B","text":"它会让人在该谈钱时不谈，把本属于自己的钱让出去"},{"key":"C","text":"因为高财商的人不需要朋友"},{"key":"D","text":"因为消费越高越有面子"}],"answer":"B","explain":"高财商按规矩办事，而不是按面子办事。","quote":"销售的本质就是两句话：第一，把东西卖出去；第二，把钱收回来。"}]},{"title":"005 03｜低财商2：怎样靠自制力守住你的财富？","questions":[{"id":"q41","no":1,"type":"单选","stem":"本讲认为提高财商的最大阻碍是什么？","options":[{"key":"A","text":"学历低"},{"key":"B","text":"自制力缺失"},{"key":"C","text":"收入太高"},{"key":"D","text":"不懂会计"}],"answer":"B","explain":"缺乏自制力会拖累消费、学习、投资和风险控制。","quote":"这一讲，我们就来讲讲背后的根源——自制力缺失。"},{"id":"q42","no":2,"type":"判断","stem":"贪图即时满足是少数人的异常行为。","options":[],"answer":"错","explain":"课程认为即时满足是人类天性，自制力才是反人性的。","quote":"贪图即时满足，才是人类天性。"},{"id":"q43","no":3,"type":"单选","stem":"“先存后花”主要解决什么问题？","options":[{"key":"A","text":"无法积累本金"},{"key":"B","text":"不会选股票"},{"key":"C","text":"不懂税务"},{"key":"D","text":"不会谈判"}],"answer":"A","explain":"先预留本金，避免收入一进来就被消费掉。","quote":"要想发大财，得先经历财富的早期积累过程。"},{"id":"q44","no":4,"type":"单选","stem":"理财领域普遍建议的储蓄比例大致是多少？","options":[{"key":"A","text":"5%"},{"key":"B","text":"10%"},{"key":"C","text":"20%"},{"key":"D","text":"80%"}],"answer":"C","explain":"文中提到存 20% 是普遍建议。","quote":"理财领域普遍的建议是，存20%比较合适。"},{"id":"q45","no":5,"type":"判断","stem":"时间和注意力也是一种隐形本金。","options":[],"answer":"对","explain":"注意力分配在哪里，能力就积累在哪里。","quote":"时间和精力，是最稀缺的隐形本金。"},{"id":"q46","no":6,"type":"多选","stem":"自制力缺失会导致哪些问题？","options":[{"key":"A","text":"过度享受，无法积累本金"},{"key":"B","text":"消耗精力，无法专注财富"},{"key":"C","text":"嫉妒盲从，错误决策"},{"key":"D","text":"自我膨胀，前功尽弃"}],"answer":"ABCD","explain":"这是本讲总结的四个后果。","quote":"自制力缺失会让我们在比较中产生嫉妒和盲从。"},{"id":"q47","no":7,"type":"单选","stem":"“看到别人发财就忍不住进场”属于哪类问题？","options":[{"key":"A","text":"嫉妒和盲从"},{"key":"B","text":"储蓄不足"},{"key":"C","text":"会计错误"},{"key":"D","text":"低利率问题"}],"answer":"A","explain":"决策参照了他人行动，而非自己的判断和计划。","quote":"高财商的人做财富决策，参照的永远是自己的判断和计划，而不是别人的行动。"},{"id":"q48","no":8,"type":"判断","stem":"高财商的人做财富决策，参照的是自己的判断和计划。","options":[],"answer":"对","explain":"这是抵抗盲从的关键。","quote":"很多投资人……开始自我膨胀，触碰那些危险的投资产品，甚至加杠杆。"},{"id":"q49","no":9,"type":"单选","stem":"芒格在 50 岁左右资产腰斩的案例说明什么？","options":[{"key":"A","text":"理性的人也可能因膨胀和杠杆犯错"},{"key":"B","text":"投资永远不该做"},{"key":"C","text":"石油危机可以预测"},{"key":"D","text":"收益率越高越安全"}],"answer":"A","explain":"顺风时更要重新校准规则，控制风险。","quote":"很多投资人……开始自我膨胀，触碰那些危险的投资产品，甚至加杠杆。"},{"id":"q50","no":10,"type":"单选","stem":"为什么自制力也在创造机会？","options":[{"key":"A","text":"因为自制力能保证每次投资赚钱"},{"key":"B","text":"因为有自制力的人可以完全不学习"},{"key":"C","text":"因为自制力反人性，大多数人做不到，能少犯错就能积累优势"},{"key":"D","text":"因为自制力等于高收入"}],"answer":"C","explain":"财商训练的机会来自多数人的人性弱点。","quote":"很多投资人……开始自我膨胀，触碰那些危险的投资产品，甚至加杠杆。"}]},{"title":"006 04｜边界：怎样识别不同类型资产的价值？","questions":[{"id":"q51","no":1,"type":"单选","stem":"本讲先讨论的是财富的哪一层含义？","options":[{"key":"A","text":"拥有的资产总价值"},{"key":"B","text":"社交关系"},{"key":"C","text":"职业头衔"},{"key":"D","text":"学历水平"}],"answer":"A","explain":"财富表层含义是资产总价值。","quote":"财富是你拥有的资产的总价值。"},{"id":"q52","no":2,"type":"判断","stem":"人拥有的是抽象的“财富”本身，而不是具体资产。","options":[],"answer":"错","explain":"财富通过资产这个载体体现。","quote":"任何人拥有的都不是财富这个词，而是通过财富的载体，也就是资产，体现出来的具体财富。"},{"id":"q53","no":3,"type":"多选","stem":"本讲把资产分为哪四类？","options":[{"key":"A","text":"使用型资产"},{"key":"B","text":"经营型资产"},{"key":"C","text":"共识驱动的资产"},{"key":"D","text":"信仰驱动的资产"}],"answer":"ABCD","explain":"这是本讲的核心分类。","quote":"第一类——使用型资产，指那些能够被直接使用或占有，主要凭自身用途而保有价值的资产。"},{"id":"q54","no":4,"type":"单选","stem":"判断使用型资产时，高财商的人最该追问什么？","options":[{"key":"A","text":"看起来贵不贵"},{"key":"B","text":"算上保有成本后净值是否为正"},{"key":"C","text":"是否被别人喜欢"},{"key":"D","text":"是否容易炫耀"}],"answer":"B","explain":"保有成本可能让资产变成负担。","quote":"对于使用型资产，高财商的人不光看它值多少钱，还会算一笔账：持有这个资产，每年要花多少钱？"},{"id":"q55","no":5,"type":"单选","stem":"经营型资产的价值关键取决于什么？","options":[{"key":"A","text":"资产本身价格"},{"key":"B","text":"经营者能否创造现金流和利润"},{"key":"C","text":"包装是否好看"},{"key":"D","text":"是否稀缺"}],"answer":"B","explain":"同样资产在不同经营者手里价值差异巨大。","quote":"第二类——经营型资产，也就是能带来直接收益，特别是能带来现金流的资产。"},{"id":"q56","no":6,"type":"判断","stem":"共识驱动的资产一定没有价值。","options":[],"answer":"错","explain":"共识本身可以很值钱，但也可能脆弱。","quote":"经营型资产的价值，不只取决于资产本身，更取决于经营者。"},{"id":"q57","no":7,"type":"单选","stem":"微软从软件公司到 SaaS / 互联网公司的估值变化，用来说明什么？","options":[{"key":"A","text":"盈利完全不重要"},{"key":"B","text":"共识改变会影响估值"},{"key":"C","text":"科技股永远上涨"},{"key":"D","text":"市盈率不能看"}],"answer":"B","explain":"同样公司因市场共识变化，估值倍数可能改变。","quote":"共识可以很值钱。"},{"id":"q58","no":8,"type":"单选","stem":"信仰驱动的资产与共识驱动资产相比，主要区别是什么？","options":[{"key":"A","text":"信仰者更坚定，危机时更愿意维护"},{"key":"B","text":"信仰资产一定没有波动"},{"key":"C","text":"共识资产一定违法"},{"key":"D","text":"信仰资产只指宗教"}],"answer":"A","explain":"信仰比普通共识更稳定、更有维护力量。","quote":"高财商的人能识别共识带来的机会，也知道共识的脆弱。"},{"id":"q59","no":9,"type":"判断","stem":"课程提到比特币，是为了直接推荐买入比特币。","options":[],"answer":"错","explain":"它用于说明信仰驱动资产的机制，不构成投资推荐。","quote":"信仰者在，资产价值就在。"},{"id":"q60","no":10,"type":"多选","stem":"面对四类资产，各自应问什么关键问题？","options":[{"key":"A","text":"使用型资产：扣除保有成本后净值是否为正"},{"key":"B","text":"经营型资产：在我手里能创造多少价值"},{"key":"C","text":"共识型资产：共识是否强化或消解"},{"key":"D","text":"信仰型资产：信仰人群是否坚定、是否松动"}],"answer":"ABCD","explain":"这些问题帮助识别资产真实价值边界。","quote":"信仰者在，资产价值就在。"}]},{"title":"007 05｜问答：自制力对财商很重要，可以后天培养吗？","questions":[{"id":"q61","no":1,"type":"单选","stem":"美国外科医生年纪增长后收入效率下降，文中重点提到的成本是什么？","options":[{"key":"A","text":"房租"},{"key":"B","text":"医疗责任保险成本"},{"key":"C","text":"交通费"},{"key":"D","text":"学费"}],"answer":"B","explain":"年龄增长可能导致保险费上升，侵蚀收入。","quote":"跑出去挣钱，不仅有收益，还有成本。"},{"id":"q62","no":2,"type":"判断","stem":"挣钱只看收入高低，不需要看成本。","options":[],"answer":"错","explain":"课程强调挣钱既有收益，也有显性和隐性成本。","quote":"医疗责任保险成本会上升，侵蚀掉部分高收入。"},{"id":"q63","no":3,"type":"单选","stem":"“世界上不仅有正数，还有负数”用于提醒什么？","options":[{"key":"A","text":"所有事情都有收益和成本"},{"key":"B","text":"数学很重要"},{"key":"C","text":"收入越高越好"},{"key":"D","text":"医生不该工作"}],"answer":"A","explain":"财富决策不能只看收入这一面。","quote":"挣钱不能只看收入，不看成本。"},{"id":"q64","no":4,"type":"判断","stem":"吴军认为自制力至少有相当一部分可以后天培养。","options":[],"answer":"对","explain":"他以自己戒可乐、减少冲动操作为例。","quote":"自制力至少在很大程度上是培养出来的。"},{"id":"q65","no":5,"type":"单选","stem":"关于小赌怡情的折中方案，吴军的建议是什么？","options":[{"key":"A","text":"可以少赌一点"},{"key":"B","text":"找人代赌即可"},{"key":"C","text":"知道有风险就应完全拒绝"},{"key":"D","text":"只在过年赌"}],"answer":"C","explain":"很多财富风险没有折中空间。","quote":"既然知道赌钱会给自己的财富带来风险，那就应该完全拒绝。"},{"id":"q66","no":6,"type":"判断","stem":"在财富积累上，原因和情有可原比行动结果更重要。","options":[],"answer":"错","explain":"财富结果更看行事方式和结果，不因迫不得已而特殊照顾。","quote":"在你想既要又要、不能及时做出决断的时候，你其实已经做出了选择。"},{"id":"q67","no":7,"type":"单选","stem":"KIPP 计划案例主要说明什么？","options":[{"key":"A","text":"隔离不良环境和损友，有助于改变命运"},{"key":"B","text":"学校越贵越好"},{"key":"C","text":"投资靠运气"},{"key":"D","text":"赌博可以控制"}],"answer":"A","explain":"环境会影响自制力和财富路径。","quote":"情商和财商之间没什么关系，甚至有时是相互矛盾的。"},{"id":"q68","no":8,"type":"判断","stem":"情商和财商有时可能相互矛盾。","options":[],"answer":"对","explain":"过度顾及关系可能带来金钱损失。","quote":"世界上的事情不可能样样完美。很多事情，放在一起，就构成了‘不可能三角’。"},{"id":"q69","no":9,"type":"单选","stem":"想同时获得好人缘、利益不受损、心里舒坦，文中称之为什么？","options":[{"key":"A","text":"最优解"},{"key":"B","text":"不可能三角"},{"key":"C","text":"套利模型"},{"key":"D","text":"复利公式"}],"answer":"B","explain":"很多目标不能同时完美满足。","quote":"世界上的事情不可能样样完美。很多事情，放在一起，就构成了‘不可能三角’。"},{"id":"q70","no":10,"type":"多选","stem":"本次问答给财商训练的共同启示是什么？","options":[{"key":"A","text":"看清收益背后的显性和隐性成本"},{"key":"B","text":"训练自制力，拒绝破坏财运的行为"},{"key":"C","text":"在人情和利益之间设定边界"},{"key":"D","text":"不要幻想所有目标都能同时完美满足"}],"answer":"ABCD","explain":"这些都指向高财商的实际行动能力。","quote":"世界上的事情不可能样样完美。很多事情，放在一起，就构成了‘不可能三角’。"}]},{"title":"008 加餐｜认知：什么样的人更容易留住财富？","questions":[{"id":"q71","no":1,"type":"单选","stem":"本讲认为更容易留住财富的人，具备哪两个底层认知？","options":[{"key":"A","text":"了解自己、了解社会"},{"key":"B","text":"会记账、会贷款"},{"key":"C","text":"情商高、学历高"},{"key":"D","text":"胆子大、动作快"}],"answer":"A","explain":"这是本讲核心框架。","quote":"他们具备两个底层认知——了解自己，了解社会。"},{"id":"q72","no":2,"type":"判断","stem":"财富技巧是“术”，了解自己和社会更接近“道”。","options":[],"answer":"对","explain":"没有底层认知，技巧可能用错地方。","quote":"后面课程说的所有技巧相当于是‘术’，而这两个认知是‘道’。"},{"id":"q73","no":3,"type":"单选","stem":"了解自己的关键是什么？","options":[{"key":"A","text":"相信自己什么都能学会"},{"key":"B","text":"了解自己的能力圈"},{"key":"C","text":"永远设最高目标"},{"key":"D","text":"跟随热门机会"}],"answer":"B","explain":"能力圈决定什么钱该赚、什么钱不该碰。","quote":"了解自己，关键是了解自己的能力圈。"},{"id":"q74","no":4,"type":"判断","stem":"芒格和巴菲特不碰自己搞不清楚的行业，是因为他们不爱学习。","options":[],"answer":"错","explain":"他们知道不是所有钱都该赚。","quote":"芒格和巴菲特不碰……自己搞不清楚的。"},{"id":"q75","no":5,"type":"单选","stem":"“到老就不要相信自己能发财了”这个例子强调什么？","options":[{"key":"A","text":"年纪大一定没机会"},{"key":"B","text":"人到一定阶段要收敛风险，不要能力圈外搏命"},{"key":"C","text":"投资越晚越好"},{"key":"D","text":"退休后应满仓冒险"}],"answer":"B","explain":"重点是认清自己和风险承受能力。","quote":"承认自己不是什么人都能成为，承认自己不是什么钱都能赚到，这不是认命，而是认清自己。"},{"id":"q76","no":6,"type":"多选","stem":"了解社会需要接受哪些关键真相？","options":[{"key":"A","text":"财富和资源是稀缺的"},{"key":"B","text":"财富是创造出来的"},{"key":"C","text":"周围人的财商平均表现比想象中低"},{"key":"D","text":"每个人都能轻松财富自由"}],"answer":"ABC","explain":"D 与课程观点相反。","quote":"世界上的财富和资源，是稀缺的。"},{"id":"q77","no":7,"type":"判断","stem":"把得不到资源完全归因于分配不公，容易让人忽视自己能创造什么。","options":[],"answer":"对","explain":"高财商会把注意力转向创造价值。","quote":"财富是靠创造出来的。"},{"id":"q78","no":8,"type":"单选","stem":"花滑冠军案例用来说明什么？","options":[{"key":"A","text":"要等别人犯错"},{"key":"B","text":"很多人的表现没有想象中好，少犯错就能跑赢平均"},{"key":"C","text":"体育和财商无关"},{"key":"D","text":"热门选手一定赢"}],"answer":"B","explain":"普通人不必极端优秀，只要长期少犯错。","quote":"周围人的财商平均表现，比你想象的低得多。"},{"id":"q79","no":9,"type":"单选","stem":"年化 5% 与 7% 的对比主要说明什么？","options":[{"key":"A","text":"2 个百分点长期差距很大"},{"key":"B","text":"投资没意义"},{"key":"C","text":"只有暴富才值得追求"},{"key":"D","text":"复利不会影响财富"}],"answer":"A","explain":"长期复利下，小差距会带来明显财富差异。","quote":"你只要比别人少犯几次错就行了。"},{"id":"q80","no":10,"type":"单选","stem":"普通工薪阶层合理的财富目标是什么？","options":[{"key":"A","text":"短期追求十倍、百倍财富"},{"key":"B","text":"通过少犯错和稳定复利，长期获得周围人两三倍财富水平"},{"key":"C","text":"完全放弃投资"},{"key":"D","text":"只看别人做什么就跟着做"}],"answer":"B","explain":"这更现实，也更符合了解自己和社会后的目标设定。","quote":"你只要比别人少犯几次错就行了。"}]},{"title":"009 06｜本质：为什么说财富是可调动的资源？","questions":[{"id":"q81","no":1,"type":"单选","stem":"本讲对财富本质的核心定义是什么？","options":[{"key":"A","text":"账面上拥有的数字总额"},{"key":"B","text":"能够调动的资源总和"},{"key":"C","text":"工资和奖金的总和"},{"key":"D","text":"房产和股票的市值"}],"answer":"B","explain":"课程把财富从静态数字重新定义为可调动资源的能力。","quote":"财富的本质，是你能够调动多少资源，满足你的需求，为你服务。"},{"id":"q82","no":2,"type":"判断","stem":"一笔钱只要躺在账户里，就已经自动成为真正的财富。","options":[],"answer":"错","explain":"钱只有能换来食物、住房、教育、医疗、服务等资源时，才真正体现财富意义。","quote":"一笔钱，如果只能躺在账户里，它就只是一个数字。"},{"id":"q83","no":3,"type":"单选","stem":"芒格“财富等于自由程度”的说法，在本讲中主要对应什么？","options":[{"key":"A","text":"财富越多，选择越多，自由度越高"},{"key":"B","text":"财富只等于现金自由"},{"key":"C","text":"自由不需要资源支撑"},{"key":"D","text":"自由只取决于职业身份"}],"answer":"A","explain":"课程将自由程度理解为可选择、可调动资源的多少。","quote":"财富越多，你能做的选择就越多，于是自由度越高。"},{"id":"q84","no":4,"type":"多选","stem":"课程认为真正有财商的人会长期投资哪些难以被抢走的财富？","options":[{"key":"A","text":"能力"},{"key":"B","text":"信用"},{"key":"C","text":"个人价值"},{"key":"D","text":"眼前的小便宜"}],"answer":"ABC","explain":"能力、信用和个人价值会提高一个人调动资源、创造结果的能力。","quote":"真正有财商的人，不会在意眼前的小钱，更不会浪费光阴，而是会持续投资自己的能力、信用，提升个人价值。"},{"id":"q85","no":5,"type":"单选","stem":"100 万元小餐馆从估值 100 万变为 200 万，课程用它说明什么？","options":[{"key":"A","text":"餐馆一定比现金更安全"},{"key":"B","text":"经营能力能让同样资源调动更多资源，从而带来财富增值"},{"key":"C","text":"所有餐馆都应该融资"},{"key":"D","text":"估值不需要看利润"}],"answer":"B","explain":"同样初始投入，在不同经营能力下会产生不同现金流和估值。","quote":"中间多出来的100万元，就是你调动资源的能力带来的。"},{"id":"q86","no":6,"type":"判断","stem":"财富一般不会凭空消失，但会经常转移。","options":[],"answer":"对","explain":"失败投资或创业的资金，可能转移为别人的收入、经验、人才培养或产业基础。","quote":"财富一般不会凭空消失，但会经常转移。"},{"id":"q87","no":7,"type":"多选","stem":"高财商的人面对一次失败的资源消耗，会尽量让它沉淀出什么？","options":[{"key":"A","text":"能力"},{"key":"B","text":"人脉"},{"key":"C","text":"行业理解"},{"key":"D","text":"只保留后悔情绪"}],"answer":"ABC","explain":"亏损不一定完全无价值，关键是是否转化为未来可调用的资源。","quote":"如果从中获得了能力、人脉和行业理解，它就不是单纯的亏损。"},{"id":"q88","no":8,"type":"单选","stem":"本讲提到隐形资源也是财富，正确理解是哪一项？","options":[{"key":"A","text":"鼓励钻灰色空子获得资源"},{"key":"B","text":"财富只存在于现金交易里"},{"key":"C","text":"合法、可持续地理解并获得更多可调动资源"},{"key":"D","text":"只要有关系就不需要能力"}],"answer":"C","explain":"课程强调理解资源如何流动，而不是利用不合法或不可持续方式。","quote":"高财商不是让你去钻灰色空子，而是理解资源如何流动，并用合法的可持续的方式，获得更多可调动的资源。"},{"id":"q89","no":9,"type":"判断","stem":"如果所有东西价格都涨了一倍，房子账面从 500 万涨到 1000 万，财富一定增加。","options":[],"answer":"错","explain":"如果能调动的资源没有增加，账面数字上涨不等于真实财富增加。","quote":"账面数字变大，但你的财富没有增加。"},{"id":"q90","no":10,"type":"多选","stem":"做买房、投资、贷款、创业等财务决策前，本讲建议重点追问什么？","options":[{"key":"A","text":"这个决定后，我能调动的资源是增加还是减少"},{"key":"B","text":"如果资源减少，是暂时的还是长期的"},{"key":"C","text":"它是否会让债务压力压缩出行、社交、学习等选择"},{"key":"D","text":"别人是不是都在做同样选择"}],"answer":"ABC","explain":"高财商看重决策后资源调动能力变强还是变弱，而不是只看账面资产。","quote":"这个决定做完之后，我能调动的资源是增加了，还是减少了？"}]}]</script><script>
const DATA=JSON.parse(document.getElementById('quiz-data').textContent);const submitted=new Set();
const exam=document.getElementById('exam'),nav=document.getElementById('nav'),overall=document.getElementById('overall');
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function norm(s){return String(s||'').replace(/\s+/g,'').replace(/[。；;，,]/g,'').toUpperCase()}
function render(){nav.innerHTML=DATA.map((s,i)=>`<a href="#lesson-${i}">${esc(s.title.replace(/^\d+\s*/,''))}</a>`).join('');exam.innerHTML=DATA.map((s,i)=>lesson(s,i)).join('');updateOverall();}
function lesson(s,i){return `<section class="lesson" id="lesson-${i}" data-lesson="${i}"><div class="lessonHead"><div><h2>${esc(s.title)}</h2><div class="meta">本节 ${s.questions.length} 题；提交前不显示答案。</div></div><div class="score" id="score-${i}">未提交</div></div>${s.questions.map(q=>card(q)).join('')}<div class="lessonActions row"><button onclick="submitLesson(${i})">提交本节</button><button class="secondary" onclick="resetLesson(${i})">重做本节</button></div></section>`}
function card(q){let input='';if(q.type==='判断'){input=`<div class="options"><label class="opt"><input type="radio" name="${q.id}" value="对"> 对</label><label class="opt"><input type="radio" name="${q.id}" value="错"> 错</label></div>`}else{input=`<div class="options">${q.options.map(o=>`<label class="opt"><input type="${q.type==='多选'?'checkbox':'radio'}" name="${q.id}" value="${o.key}"> <b>${o.key}.</b> ${esc(o.text)}</label>`).join('')}</div>`}return `<article class="card" data-id="${q.id}"><div class="qhead"><b>${q.no}. ${esc(q.stem)}</b><span class="badge">${esc(q.type)}</span></div>${input}<div class="reveal"><div class="judge"></div><div><b>答案：</b>${esc(q.answer)}</div><blockquote><b>原文依据：</b>“${esc(q.quote)}”</blockquote><div><b>论证：</b>${esc(q.explain)} 这道题考察的是能否把题干中的行为/概念对应回课程原文中的核心判断，而不是凭直觉作答。</div></div></article>`}
function getAns(q){return [...document.querySelectorAll(`[name="${q.id}"]`)].filter(e=>e.checked).map(e=>e.value).sort().join('')}
function isRight(q){return norm(getAns(q))===norm(q.answer)}
function submitLesson(i){const sec=DATA[i];let undone=sec.questions.filter(q=>!getAns(q)).length;if(undone&&!confirm(`本节还有 ${undone} 题未答，确定提交吗？`))return;let right=0;const root=document.querySelector(`[data-lesson="${i}"]`);root.classList.add('submitted');submitted.add(i);sec.questions.forEach(q=>{let ok=isRight(q);if(ok)right++;let card=root.querySelector(`[data-id="${q.id}"]`);card.querySelector('.judge').innerHTML=ok?'<span class="correct">✓ 正确</span>':'<span class="wrong">✗ 错误</span>';card.querySelectorAll('input').forEach(e=>e.disabled=true);});document.getElementById(`score-${i}`).textContent=`本节得分：${right} / ${sec.questions.length}`;updateOverall();}
function resetLesson(i){if(!confirm('确定重做本节？'))return;const root=document.querySelector(`[data-lesson="${i}"]`);root.classList.remove('submitted');submitted.delete(i);DATA[i].questions.forEach(q=>{root.querySelectorAll(`[name="${q.id}"]`).forEach(e=>{e.checked=false;e.disabled=false});let c=root.querySelector(`[data-id="${q.id}"] .judge`);if(c)c.innerHTML='';});document.getElementById(`score-${i}`).textContent='未提交';updateOverall();}
function updateOverall(){let total=DATA.length,done=submitted.size;let qs=0,rs=0;submitted.forEach(i=>DATA[i].questions.forEach(q=>{qs++;if(isRight(q))rs++;}));overall.textContent=`已提交 ${done} / ${total} 节；已提交部分总分 ${rs} / ${qs||0}。每节可单独重做。`;}
function resultRows(){let name=document.getElementById('student').value.trim()||'未填写';let rows=[];submitted.forEach(i=>DATA[i].questions.forEach(q=>rows.push([name,DATA[i].title,q.no,q.type,getAns(q),q.answer,isRight(q)?'正确':'错误'])));return rows;}
function csvText(){let rows=resultRows();return '姓名,课程,题号,题型,作答,标准答案,判定\n'+rows.map(r=>r.map(x=>'"'+String(x??'').replace(/"/g,'""')+'"').join(',')).join('\n');}
document.getElementById('copyAll').onclick=()=>navigator.clipboard.writeText(csvText()).then(()=>alert('已复制已提交成绩。'));
document.getElementById('csvAll').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csvText()],{type:'text/csv'}));a.download='wujun-finance-lesson-scores.csv';a.click();};
render();
</script></body></html>
