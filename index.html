</script><script>
const DATA=JSON.parse(document.getElementById('quiz-data').textContent);const submitted=new Set();
const exam=document.getElementById('exam'),nav=document.getElementById('nav'),overall=document.getElementById('overall');
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function norm(s){return String(s||'').replace(/\s+/g,'').replace(/[。；;，,]/g,'').toUpperCase()}
function render(){nav.innerHTML=DATA.map((s,i)=>`<a href="#lesson-${i}">${esc(s.title.replace(/^\d+\s*/,''))}</a>`).join('');exam.innerHTML=DATA.map((s,i)=>lesson(s,i)).join('');updateOverall();}
function lesson(s,i){return `<section class="lesson" id="lesson-${i}" data-lesson="${i}"><div class="lessonHead"><div><h2>${esc(s.title)}</h2><div class="meta">本节 ${s.questions.length} 题；提交前不显示答案。</div></div><div class="score" id="score-${i}">未提交</div></div>${s.questions.map(q=>card(q)).join('')}<div class="lessonActions row"><button onclick="submitLesson(${i})">提交本节</button><button class="secondary" onclick="resetLesson(${i})">重做本节</button></div></section>`}
function card(q){let input='';if(q.type==='判断'){input=`<div class="options"><label class="opt"><input type="radio" name="${q.id}" value="对"> 对</label><label class="opt"><input type="radio" name="${q.id}" value="错"> 错</label></div>`}else{input=`<div class="options">${q.options.map(o=>`<label class="opt"><input type="${q.type==='多选'?'checkbox':'radio'}" name="${q.id}" value="${o.key}"> <b>${o.key}.</b> ${esc(o.text)}</label>`).join('')}</div>`}return `<article class="card" data-id="${q.id}"><div class="qhead"><b>${q.no}. ${esc(q.stem)}</b><span class="badge">${esc(q.type)}</span></div>${input}<div class="reveal"><div class="judge"></div><div><b>答案：</b>${esc(q.answer)}</div><blockquote><b>原文依据：</b>“${esc(q.quote)}”</blockquote><div><b>论证：</b>${esc(q.explain)} 这道题考察的是能否把题干中的行为/概念对应回课程原文中的核心判断，而不是凭直觉作答。</div></div></article>`}
function getAns(q){return [...document.querySelectorAll(`[name="${q.id}"]`)].filter(e=>e.checked).map(e=>e.value).sort().join('')}
function isRight(q){return norm(getAns(q))===norm(q.answer)}
function submitLesson(i){const sec=DATA[i];let undone=sec.questions.filter(q=>!getAns(q)).length;if(undone&&!confirm(`本节还有 ${undone} 题未答，确定提交吗？`))return;let right=0;const root=document.querySelector(`[data-lesson="${i}"]`);root.classList.add('submitted');submitted.add(i);sec.questions.forEach(q=>{let ok=isRight(q);if(ok)right++;let card=root.querySelector(`[data-id="${q.id}"]`);card.querySelector('.judge').innerHTML=ok?'<span class="correct">✓ 正确</span>':'<span class="wrong">✗ 错误</span>';card.querySelectorAll('input').forEach(e=>e.disabled=true);});document.getElementById(`score-${i}`).textContent=`本节得分：${right} / ${sec.questions.length}`;updateOverall();}
function resetLesson(i){if(!confirm('确定重做本节？'))return;const root=document.querySelector(`[data-lesson="${i}"]`);root.classList.remove('submitted');submitted.delete(i);DATA[i].questions.forEach(q=>{root.querySelectorAll(`[name="${q.id}"]`).forEach(e=>{e.checked=false;e.disabled=false});let c=root.querySelector(`[data-id="${q.id}"] .judge`);if(c)c.innerHTML='';});document.getElementById(`score-${i}`).textContent='未提交';updateOverall();}
function updateOverall(){let total=DATA.length,done=submitted.size;let qs=0,rs=0;submitted.forEach(i=>DATA[i].questions.forEach(q=>{qs++;if(isRight(q))rs++;}));overall.textContent=`已提交 ${done} / ${total} 节；已提交部分总分 ${rs} / ${qs||0}。每节可单独重做。`;}
function resultRows(){let name=document.getElementById('student').value.trim()||'未填写';let rows=[];submitted.forEach(i=>DATA[i].questions.forEach(q=>rows.push([name,DATA[i].title,q.no,q.type,getAns(q),q.answer,isRight(q)?'正确':'错误'])));return rows;}
function csvText(){let rows=resultRows();return '姓名,课程,题号,题型,作答,标准答案,判定\n'+rows.map(r=>r.map(x=>'"'+String(x??'').replace(/"/g,'""')+'"').join(',')).join('\n');}
document.getElementById('copyAll').onclick=()=>navigator.clipboard.writeText(csvText()).then(()=>alert('已复制已提交成绩。'));
document.getElementById('csvAll').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csvText()],{type:'text/csv'}));a.download='wujun-finance-lesson-scores.csv';a.click();};
render();
</script></body></html>
